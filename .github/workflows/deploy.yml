name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - content.json
      - site-generator/**
      - .github/workflows/deploy.yml

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install recorder app dependencies
        run: npm --prefix recorder-app ci

      - name: Run tests
        run: npm test

      - name: Generate site
        run: npm run generate

      - name: Add .nojekyll
        run: touch docs/.nojekyll

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit generated docs
        run: |
          git add docs/
          git diff --cached --quiet || git commit -m "chore: regenerate site [skip ci]"

      - name: Push changes
        run: git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4